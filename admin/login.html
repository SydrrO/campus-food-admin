<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台登录</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vant@3/lib/index.css">
    <style>
        :root {
            --bg: #edfafa;
            --panel: rgba(255, 255, 255, 0.9);
            --ink: #072f33;
            --muted: #5b7475;
            --line: rgba(10, 186, 181, 0.26);
            --accent: #0abab5;
            --gold: #b99a5d;
            --shadow: 0 26px 68px rgba(4, 70, 73, 0.16), inset 0 1px 0 rgba(255, 255, 255, 0.86);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(135deg, rgba(237, 250, 250, 0.98) 0%, rgba(252, 255, 253, 0.94) 48%, rgba(228, 248, 246, 0.98) 100%),
                repeating-linear-gradient(45deg, rgba(10, 186, 181, 0.08) 0 1px, transparent 1px 34px);
            color: var(--ink);
            font-family: "Microsoft YaHei", sans-serif;
            letter-spacing: 0;
        }
        .page {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            overflow: hidden;
        }
        .page::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(90deg, rgba(185, 154, 93, 0.18), transparent 18%),
                linear-gradient(180deg, rgba(10, 186, 181, 0.1), transparent 260px);
            pointer-events: none;
        }
        .login-box {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 430px;
            padding: 32px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }
        .login-box::before {
            content: "";
            display: block;
            width: 76px;
            height: 3px;
            margin-bottom: 18px;
            background: linear-gradient(90deg, var(--accent), var(--gold));
            border-radius: 999px;
        }
        .login-title {
            margin: 0;
            color: #062f33;
            font-size: 30px;
            font-weight: 950;
        }
        .van-cell-group--inset {
            margin: 0;
            border: 1px solid rgba(10, 186, 181, 0.2);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.92);
        }
        .van-cell {
            background: rgba(255, 255, 255, 0.82);
        }
        .van-field__label {
            color: var(--muted);
        }
        .van-button--primary {
            border-color: #079d99;
            background: linear-gradient(135deg, #0abab5, #087b80);
            box-shadow: 0 14px 32px rgba(10, 186, 181, 0.24);
        }
        .van-button--round {
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="app" class="page">
        <div class="login-box">
            <h1 class="login-title">赛杜甄选商家后台</h1>

            <form @submit.prevent="handleSubmit" style="margin-top: 22px;">
                <van-cell-group inset>
                    <van-field
                        v-model.trim="username"
                        label="用户名"
                        placeholder="请输入管理员用户名"
                        autocomplete="username"
                        clearable
                        required
                    ></van-field>
                    <van-field
                        v-model="password"
                        type="password"
                        label="密码"
                        placeholder="请输入管理员密码"
                        autocomplete="current-password"
                        clearable
                        required
                    ></van-field>
                </van-cell-group>

                <div style="margin: 18px 0 0;">
                    <van-button
                        round
                        block
                        type="primary"
                        native-type="submit"
                        :loading="submitting"
                        loading-text="登录中..."
                    >
                        登录后台
                    </van-button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/vant@3/lib/vant.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js?v=20260428-0205"></script>
    <script src="js/api.js"></script>
    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const { showToast } = vant;
                const username = ref('');
                const password = ref('');
                const submitting = ref(false);
                const getRedirectTarget = () => {
                    const redirect = new URLSearchParams(window.location.search).get('redirect');
                    if (!redirect) {
                        return 'index.html';
                    }
                    const target = redirect.trim();
                    if (
                        !target ||
                        target.includes('\\') ||
                        target.startsWith('//') ||
                        /^https?:\/\//i.test(target) ||
                        target.split('?')[0].endsWith('login.html')
                    ) {
                        return 'index.html';
                    }
                    return target;
                };

                const handleSubmit = async () => {
                    if (submitting.value) {
                        return;
                    }

                    if (!username.value || !password.value) {
                        showToast('请输入用户名和密码');
                        return;
                    }

                    submitting.value = true;

                    try {
                        await api.adminLogin(username.value, password.value);
                        window.location.replace(getRedirectTarget());
                    } catch (error) {
                        showToast(error.message || '登录失败');
                    } finally {
                        submitting.value = false;
                    }
                };

                return {
                    username,
                    password,
                    submitting,
                    handleSubmit
                };
            }
        }).use(vant).mount('#app');
    </script>
</body>
</html>
